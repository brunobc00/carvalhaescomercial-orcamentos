services:
  db:
    image: postgres:16-alpine
    container_name: carvalhaes-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - carvalhaes_pgdata:/var/lib/postgresql/data

volumes:
  carvalhaes_pgdata:
